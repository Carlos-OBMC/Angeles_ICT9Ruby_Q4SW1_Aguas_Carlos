<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q4 Seatwork 1</title>

<style>
    body {
        font-family: Arial;
        background: linear-gradient(to right, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-box {
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        width: 260px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input {
        width: 90%;
        padding: 8px;
        margin: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 8px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .login-btn {
        background: #00c6ff;
        color: white;
    }

    .cancel-btn {
        background: #ddd;
    }

    button:hover {
        opacity: 0.8;
    }

    #message {
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <label>Username</label><br>
    <input type="text" id="username" placeholder="Enter here"><br>

    <label>Password</label><br>
    <input type="password" id="password" placeholder="Enter here"><br>

    <button class="login-btn" onclick="login()">Login</button>
    <button class="cancel-btn" onclick="clearFields()">Cancel</button>

    <p id="message"></p>
</div>

<script>
// Correct login credentials
let correctUsername = "admin";
let correctPassword = "1234";

// Login function
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // CONDITIONAL STATEMENT
    if (user === correctUsername && pass === correctPassword) {
        alert("Access granted. Welcome " + user + "!");
        document.getElementById("message").innerHTML = "Login successful!";
    } else {
        alert("Incorrect username or password.");
        document.getElementById("message").innerHTML = "Access denied!";
    }
}

// Clear inputs
function clearFields() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("message").innerHTML = "";
}
</script>

</body>
</html>
